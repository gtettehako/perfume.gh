<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Shady Market — Perfume</title>
  <meta name="description" content="Premium perfumes delivered to your door." />
  <link rel="preconnect" href="https://images.unsplash.com" crossorigin>
  <style>
    /* Basic global styles before app loads */
    :root{
      --bg:#07070a;
      --panel: rgba(255,255,255,.06);
      --panel2: rgba(255,255,255,.09);
      --text:#f4f4f6;
      --muted: rgba(244,244,246,.72);
      --brand:#c7a17a;
      --brand2:#e7d2b7;
      --danger:#ff4d4d;
      --ok:#4dff9a;
      --shadow: 0 16px 60px rgba(0,0,0,.55);
      --radius: 18px;
      --radius2: 14px;
      --ring: 0 0 0 3px rgba(199,161,122,.22);
      --max: 1160px;
      --grid-gap: 18px;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }
    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      background:
        radial-gradient(1200px 800px at 20% -10%, rgba(199,161,122,.22), transparent 55%),
        radial-gradient(900px 700px at 90% 10%, rgba(231,210,183,.14), transparent 52%),
        radial-gradient(700px 600px at 30% 90%, rgba(124,92,255,.10), transparent 55%),
        var(--bg);
      color:var(--text);
      line-height:1.35;
    }
    a{ color:inherit; text-decoration:none; }
    button, input, select, textarea{ font:inherit; }
    .app-root{ min-height:100vh; }
  </style>
</head>
<body>
  <div id="app" class="app-root"></div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
